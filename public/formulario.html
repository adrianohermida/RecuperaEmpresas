<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário | Recupera Empresas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/portal.css?v=20260422a">
</head>
<body class="public-form-body">
  <main class="public-form-shell">
    <section class="public-form-hero">
      <div class="public-form-hero-copy">
        <div class="public-form-kicker">Modo público</div>
        <h1 id="public-form-title" class="public-form-title">Carregando formulário...</h1>
        <p id="public-form-description" class="public-form-description">Um único motor atende experiências públicas e autenticadas.</p>
      </div>
      <div class="public-form-progress-card">
        <div class="public-form-progress-head">
          <span>Etapa</span>
          <span id="public-form-progress-label">0 de 0</span>
        </div>
        <div class="dashboard-player-progress-track public-form-progress-track">
          <div id="public-form-progress-bar" class="dashboard-player-progress-fill"></div>
        </div>
        <div id="public-form-status" class="public-form-status ui-hidden"></div>
      </div>
    </section>

    <section class="public-form-stage-card">
      <div id="public-form-runner" class="public-form-runner">
        <div class="admin-empty-state-soft">Carregando...</div>
      </div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/shared.js?v=20260421n"></script>
  <script src="/js/form-runtime.js?v=20260422a"></script>
  <script src="/js/form-public.js?v=20260422a"></script>
</body>
</html>
