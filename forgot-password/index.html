<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Redirecionando para o Portal</title>
  <script>
    (function () {
      var target = 'https://portal.recuperaempresas.com.br/forgot-password' + window.location.search + window.location.hash;
      document.addEventListener('DOMContentLoaded', function () {
        var link = document.getElementById('portalLink');
        if (link) link.href = target;
      });
      if (window.location.protocol !== 'http:' && window.location.protocol !== 'https:') return;
      window.location.assign(target);
    })();
  </script>
</head>
<body>
  <p>Redirecionando para o portal...</p>
  <p><a id="portalLink" href="https://portal.recuperaempresas.com.br/forgot-password">Abrir portal</a></p>
</body>
</html>
