name: Deploy Cloudflare Assets

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  WRANGLER_LOG: debug
  FORCE_COLOR: '0'
  PAGES_PRODUCTION_BRANCH: gh-pages
  CLOUDFLARE_ZONE_NAME: recuperaempresas.com.br

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile-bindings:
    name: Reconcile Cloudflare Bindings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_NAME: recuperaempresas.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconcile bindings via Cloudflare API
        shell: bash
        run: bash scripts/reconcile-cloudflare-bindings.sh

      - name: Upload binding audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-bindings-audit
          path: .cloudflare-audit/
          if-no-files-found: warn

  deploy-portal:
    name: Deploy Portal Pages
    runs-on: ubuntu-latest
    needs: reconcile-bindings
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RE_API_BASE: https://api.recuperaempresas.com.br
      RE_API_WORKER_BASE: https://api-edge.recuperaempresas.com.br
      RE_API_WORKER_ROUTES: ''
      VITE_SUPABASE_URL: https://riiajjmnzgagntiqqshs.supabase.co
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      RE_ENABLE_FRESHCHAT: 'false'
      RE_FRESHCHAT_TOKEN: ''
      RE_FRESHCHAT_SITE_ID: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portal
        run: npm run build

      - name: Prepare portal logs directory
        run: mkdir -p .wrangler-logs

      - name: Check Cloudflare auth for portal
        shell: bash
        run: |
          set -o pipefail
          if ! output=$(npx --yes wrangler@4.12.0 whoami 2>&1); then
            echo "::error title=Cloudflare auth portal::${output//$'\n'/ }"
            exit 1
          fi

      - name: Ensure portal production branch
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --request PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/recuperaempresas" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"production_branch\":\"${PAGES_PRODUCTION_BRANCH}\"}" >/dev/null

      - name: Deploy portal to Pages
        shell: bash
        run: |
          set -o pipefail
          export WRANGLER_OUTPUT_FILE_PATH=.wrangler-logs/portal-pages.ndjson
          if ! output=$(npx --yes wrangler@4.12.0 pages deploy dist --project-name=recuperaempresas --branch=gh-pages 2>&1); then
            echo "::error title=Deploy portal::${output//$'\n'/ }"
            exit 1
          fi

          echo "$output"

      - name: Upload portal logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-pages-logs
          path: .wrangler-logs/
          if-no-files-found: warn

  deploy-landing:
    name: Deploy Landing Pages
    runs-on: ubuntu-latest
    needs: reconcile-bindings
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare landing logs directory
        run: mkdir -p .wrangler-logs

      - name: Check Cloudflare auth for landing
        shell: bash
        run: |
          set -o pipefail
          if ! output=$(npx --yes wrangler@4.12.0 whoami 2>&1); then
            echo "::error title=Cloudflare auth landing::${output//$'\n'/ }"
            exit 1
          fi

      - name: Ensure landing production branch
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --request PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/recuperaempresas-landing" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"production_branch\":\"${PAGES_PRODUCTION_BRANCH}\"}" >/dev/null

      - name: Deploy landing to Pages
        shell: bash
        run: |
          set -o pipefail
          export WRANGLER_OUTPUT_FILE_PATH=.wrangler-logs/landing-pages.ndjson
          if ! output=$(npx --yes wrangler@4.12.0 pages deploy landing --project-name=recuperaempresas-landing --branch=gh-pages 2>&1); then
            echo "::error title=Deploy landing::${output//$'\n'/ }"
            exit 1
          fi

          echo "$output"

      - name: Upload landing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landing-pages-logs
          path: .wrangler-logs/
          if-no-files-found: warn

  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: reconcile-bindings
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare worker logs directory
        run: mkdir -p .wrangler-logs

      - name: Check Cloudflare auth for worker
        shell: bash
        run: |
          set -o pipefail
          if ! output=$(npx --yes wrangler@4.12.0 whoami 2>&1); then
            echo "::error title=Cloudflare auth worker::${output//$'\n'/ }"
            exit 1
          fi

      - name: Deploy Worker
        shell: bash
        run: |
          set -o pipefail
          export WRANGLER_OUTPUT_FILE_PATH=.wrangler-logs/worker-deploy.ndjson
          if ! output=$(npx --yes wrangler@4.12.0 deploy -c workers/portal-api/wrangler.toml 2>&1); then
            echo "::error title=Deploy worker::${output//$'\n'/ }"
            exit 1
          fi

          echo "$output"

      - name: Upload worker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-deploy-logs
          path: .wrangler-logs/
          if-no-files-found: warn