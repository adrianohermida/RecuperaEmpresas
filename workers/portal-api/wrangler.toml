name = "recuperaempresas-api"
main = "src/index.mjs"
compatibility_date = "2026-04-16"
workers_dev = false

routes = [
	{ pattern = "api-edge.recuperaempresas.com.br", custom_domain = true }
]

[observability]
enabled = true

[vars]
ALLOWED_ORIGINS = "https://portal.recuperaempresas.com.br"
ADMIN_EMAILS = "contato@recuperaempresas.com.br,camilaghmaia@gmail.com,adrianohermida@gmail.com"
BASE_URL = "https://portal.recuperaempresas.com.br"
EMAIL_FROM = "Recupera Empresas <contato@recuperaempresas.com.br>"
EMAIL_TO = "contato@recuperaempresas.com.br"

# Secrets to configure with `wrangler secret put`:
# - VITE_SUPABASE_URL ou SUPABASE_URL
# - VITE_SUPABASE_ANON_KEY ou SUPABASE_ANON_KEY
# - VITE_SUPABASE_SERVICE_ROLE ou SUPABASE_SERVICE_ROLE_KEY
# - JWT_SECRET
# - RESEND_API_KEY
# - STRIPE_SECRET_KEY                (Stripe secret key para checkout de créditos)
# - GOOGLE_CLIENT_ID                 (OAuth2 client ID para integração Google Calendar)
# - GOOGLE_CLIENT_SECRET             (OAuth2 client secret para Google Calendar)
# - GOOGLE_OAUTH_REFRESH_TOKEN       (OAuth2 refresh token do calendário da Camila)
# - GOOGLE_CALENDAR_WEBHOOK_SECRET   (Token para validar notificações push do Google Calendar)
#
# Variáveis opcionais (podem ser definidas em [vars] ou como secrets):
# - GOOGLE_CALENDAR_ID   (ID do calendário; padrão: 'primary')
# - CAMILA_WORK_START    (início do expediente; padrão: '08:00')
# - CAMILA_WORK_END      (fim do expediente; padrão: '18:00')
# - CAMILA_SLOT_MIN      (duração de cada janela livre em minutos; padrão: 60)
# - CAMILA_DAYS_AHEAD    (dias à frente para calcular disponibilidade; padrão: 7)

# Optional binding for persistent admin message read state:
# [[kv_namespaces]]
# binding = "ADMIN_MESSAGE_STATE"
# id = "<production-namespace-id>"
# preview_id = "<preview-namespace-id>"